version: 1.0.0
last_updated: 2026-06-17
canonical_url: https://tokenese.org/relationships.yaml
ontology: https://tokenese.org/ontology.json
roadmap: https://github.com/snapsynapse/tokenese/blob/main/ROADMAP.md

core_thesis: LLMs conforming to human language is film in black and white. Tokenese is a token-native interlingua that is denser and more precise than any human language, with every lexicon element admitted by reproducible tokenizer audit.

grammar:
  current: v0.3
  delta_doc: https://github.com/snapsynapse/tokenese/blob/main/GRAMMAR-v0.3.md
  design_rationale: https://github.com/snapsynapse/tokenese/blob/main/DESIGN.md
  conformance: https://github.com/snapsynapse/tokenese/blob/main/CONFORMANCE.md

reference_implementation:
  language: Python 3.11+
  package: tokenese_translator
  scorer_package: tkab
  install_path: tools/translator/
  test_count: 132
  cli:
    - tokenese-translate
    - tokenese-check
  mcp_server: tokenese_translator.mcp_server
  schema_versions:
    grammar: v0.3
    tkab_output: tkab-check-1.1
    framesets: tokenese-framesets-0.1
  audit_scripts:
    - audit_symbols.py   # OpenAI o200k_base
    - audit_anthropic.py # Anthropic count-tokens

trust_anchors:
  assistant_guide:
    path: assistant-guide.txt
    profile: human-verifiable-assistant-guide 0.6.0
    level: 3
    level_4_pending: DNS TXT at _assistant-guide.tokenese.org

relationships:
  turnfile:
    url: https://turnfile.work/
    relation: candidate envelope for multi-agent sessions speaking Tokenese
    binding: non-binding
  graceful_boundaries:
    url: https://gracefulboundaries.dev/
    relation: refusal-adjacent surfaces (plain escape, repair) may adopt GB formatting
    binding: non-binding
  hardguard25:
    url: https://hardguard25.com/
    relation: token-budget metadata is a natural Tokenese payload
    binding: non-binding

prior_art:
  agora_protocol:
    url: https://arxiv.org/abs/2410.11905
    borrowed: in-band negotiated bindings
  gibberlink:
    url: https://github.com/PennyroyalTea/gibberlink
    borrowed: capability handshake before dense mode
  llmlingua:
    relation: complementary payload compression, out of scope
  droidspeak_cipher_coconut:
    relation: latent-space exchange, reviewed and rejected per design invariant 1
