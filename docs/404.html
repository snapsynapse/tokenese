<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>?? &middot; Tokenese</title>
  <meta name="theme-color" content="#5EE6C4">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --text: #e1e4ed; --text-muted: #8b90a0; --accent: #5EE6C4;
      --accent-hover: #8ff2dc; --border: #2e3345; --code-bg: #0b0d13;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --mono: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    }
    body {
      font-family: var(--font); color: var(--text); background: var(--bg);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem; line-height: 1.6;
    }
    .wrap { max-width: 520px; }
    .mark { color: var(--accent); margin-bottom: 1.5rem; }
    .repair {
      font-family: var(--mono); font-size: 1.05rem; color: var(--accent);
      background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.25rem; margin: 0 auto 1.75rem; display: inline-block;
    }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: -0.01em; }
    p { color: var(--text-muted); margin-bottom: 1.5rem; }
    a.home {
      display: inline-block; padding: 0.7rem 1.4rem; border-radius: 6px;
      background: var(--accent); color: var(--bg); font-weight: 600; text-decoration: none;
    }
    a.home:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" width="56" height="56" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <path d="M13 7 L6 16 L13 25" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="16" r="3" fill="currentColor"/>
      <path d="M19 7 L26 16 L19 25" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="repair">?? @page // not found, resend in plain English</div>
    <h1>This page misparsed</h1>
    <p>The referent you asked for is not bound in the symbol table. In Tokenese, that calls for a repair: drop back to a known page.</p>
    <a class="home" href="/">Return to tokenese.org</a>
  </div>
</body>
</html>
